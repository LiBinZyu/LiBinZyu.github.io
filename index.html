<!DOCTYPE html>
<html lang="zh-CN" data-lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>李炳儒 Portfolio</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@100..900&display=swap"
        rel="stylesheet">

    <!-- CSS Files -->
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/components.css">

    <!-- Three.js and Vanta.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.birds.min.js"></script>
</head>

<body class="theme-light">
    <!-- Vanta.js Birds Effect - Full Screen Background -->
    <div id="vanta-birds" class="vanta-container"></div>

    <!-- Header with Profile -->
    <header class="header">
        <div class="container">
            <div class="profile-section">
                <div class="profile-bio"></div>
                <div class="profile-meta">
                    <div class="profile-image">
                        <img src="assets/images/profile_life.png" alt="Profile Image" id="profile-img"
                            onerror="this.src='https://via.placeholder.com/150x150/193FB9/FFFFFF?text=LBZ'; console.error('Failed to load profile image, using placeholder')"
                            onload="console.log('Profile image loaded successfully')">
                    </div>
                    <h1 class="profile-name" data-en="Bingru Li" data-zh="李炳儒">李炳儒</h1>
                </div>
            </div>
        </div>
    </header>

    <!-- Navigation Menu -->
    <nav class="nav-menu">
        <div class="container">
            <div class="nav-items">
                <button class="nav-item active" data-section="projects">
                    <img src="https://cdn.jsdelivr.net/npm/iconoir@latest/icons/arcade.svg" alt="Projects" class="icon"
                        width="20" height="20">
                    <span data-en="Project" data-zh="项目">项目</span>
                </button>
                <button class="nav-item" data-section="experiences">
                    <img src="https://cdn.jsdelivr.net/npm/iconoir@latest/icons/handbag.svg" alt="Experiences"
                        class="icon" width="20" height="20">
                    <span data-en="Experience" data-zh="经历">经历</span>
                </button>
                <button class="nav-item" data-section="blog">
                    <img src="https://cdn.jsdelivr.net/npm/iconoir@latest/icons/book.svg" alt="Blog" class="icon"
                        width="20" height="20">
                    <span data-en="Blog" data-zh="文章">文章</span>
                </button>
                <button class="nav-item" data-section="contact">
                    <img src="https://cdn.jsdelivr.net/npm/iconoir@latest/icons/send-mail.svg" alt="Contact"
                        class="icon" width="20" height="20">
                    <span data-en="Contact" data-zh="联系">联系</span>
                </button>
            </div>
            <div class="nav-controls">
                <button class="btn btn-primary" id="download-cv" title="Download CV">
                    <img src="https://cdn.jsdelivr.net/npm/iconoir@latest/icons/cloud-download.svg" class="icon"
                        width="16" height="16" style="filter: brightness(0) invert(1);">
                    <span data-en="CV" data-zh="简历">简历</span>
                </button>
                <button class="btn btn-secondary" id="theme-toggle" title="Toggle Theme">
                    <img src="https://cdn.jsdelivr.net/npm/iconoir@latest/icons/half-moon.svg" class="icon" width="16"
                        height="16">
                </button>
                <button class="btn btn-secondary" id="language-toggle" title="Toggle Language">
                    <img src="https://cdn.jsdelivr.net/npm/iconoir@latest/icons/translate.svg" alt="Toggle Language"
                        class="icon" width="16" height="16">
                </button>
            </div>
        </div>
    </nav>

    <div class="main-content">
        <!-- Waterfall Container -->
        <div class="waterfall-container">
            <!-- Projects Section -->
            <section id="projects" class="content-section full-width-section">
                <div class="category-filter-container">
                    <button class="filter-btn active" data-category="all">
                        <span data-en="All" data-zh="全部">全部</span>
                    </button>
                    <button class="filter-btn" data-category="spatial-xr">
                        <span data-en="Spatial & XR" data-zh="XR 空间计算">XR 空间计算</span>
                    </button>
                    <button class="filter-btn" data-category="3d-tech-art">
                        <span data-en="3D Art" data-zh="3D">3D</span>
                    </button>
                    <button class="filter-btn" data-category="ai-software">
                        <span data-en="AI" data-zh="AI">AI</span>
                    </button>
                    <button class="filter-btn" data-category="research">
                        <span data-en="Research" data-zh="学术研究">学术研究</span>
                    </button>
                </div>
                <div class="projects-grid" id="projects-content">
                    <!-- Content will be loaded from data file -->
                </div>
            </section>

            <!-- Experiences Section -->
            <section id="experiences" class="content-section full-width-section">
                <div class="experiences-timeline" id="experiences-content">
                    <!-- Content will be loaded from data file -->
                </div>
            </section>

            <!-- Blog Section -->
            <section id="blog" class="content-section full-width-section">
                <div class="blog-list" id="blogs-content">
                    <!-- Content will be loaded from data file -->
                </div>
            </section>

            <!-- Contact Section -->
            <section id="contact" class="content-section full-width-section">
                <div class="contact-content">
                    <div class="contact-card-panel">
                        <div class="contact-info" id="contact-info-list">
                            <div class="contact-item contact-download-item" id="contact-download-profile">
                                <img src="https://cdn.jsdelivr.net/npm/iconoir@latest/icons/cloud-download.svg"
                                    class="contact-icon icon" width="18" height="18">
                                <span data-en="Download Resume" data-zh="下载个人简历">下载个人简历</span>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <!-- Project Modal -->
    <div id="project-modal" class="project-modal">
        <div class="modal-backdrop" id="modal-backdrop"></div>
        <div class="modal-content">
            <button class="modal-close" id="modal-close">
                <img src="https://cdn.jsdelivr.net/npm/iconoir@latest/icons/cancel.svg" alt="Close" class="icon"
                    width="20" height="20">
            </button>
            <div class="modal-info modal-info-textonly">
                <h2 class="modal-title" id="modal-title"></h2>
                <p class="modal-description" id="modal-description"></p>
                <div class="tech-tags" id="modal-tech"></div>
                <div class="project-links" id="modal-links"></div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <p class="footer-text">
                    <span data-en="Last updated:" data-zh="最后更新：">最后更新：</span>
                    <span id="last-updated">2026-05-16</span>
                </p>
                <p class="footer-text">
                    <span data-en="Location:" data-zh="所在地：">所在地：</span>
                    <span data-en="Shanghai" data-zh="上海">上海</span>
                </p>
            </div>
        </div>
    </footer>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loading-overlay">
        <div class="loading-spinner">
            <div class="spinner"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="data/data.js"></script>
    <script src="js/components.js"></script>
    <script src="js/main.js"></script>

    <!-- Vanta.js Birds Effect -->
    <script>
        // Vanta.js birds effect instance
        let vantaEffect = null;

        // Color schemes for different themes
        const lightThemeColors = {
            color1: 0x8d9aeb,
            color2: 0x465bff,
            speedLimit: 5.00
        };

        const darkThemeColors = {
            color1: 0x372b6e,
            color2: 0x142455,
            speedLimit: 4.00
        };

        // Function to initialize Vanta effect
        function initVantaEffect() {
            // Check current theme
            const isDarkTheme = document.body.classList.contains('theme-dark');
            const colors = isDarkTheme ? darkThemeColors : lightThemeColors;

            // Destroy existing effect if it exists
            if (vantaEffect) {
                vantaEffect.destroy();
            }

            // Initialize new effect
            vantaEffect = VANTA.BIRDS({
                el: "#vanta-birds",
                mouseControls: true,
                touchControls: true,
                gyroControls: false,
                minHeight: 200.00,
                minWidth: 200.00,
                scale: 1.00,
                scaleMobile: 1.00,
                backgroundAlpha: 0.00,
                ...colors
            });
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', function () {
            initVantaEffect();
        });

        // Listen for theme changes
        const themeToggle = document.getElementById('theme-toggle');
        if (themeToggle) {
            themeToggle.addEventListener('click', function () {
                // Wait for theme class to be applied
                setTimeout(() => {
                    initVantaEffect();
                }, 100);
            });
        }

        // Scroll Spy and Smooth Scroll functionality
        function initScrollSpy() {
            const navItems = document.querySelectorAll('.nav-item');
            const sections = document.querySelectorAll('.full-width-section');

            let isSmoothScrolling = false;
            let scrollTimeout;

            // Smooth scroll function
            function smoothScrollTo(targetId) {
                isSmoothScrolling = true;

                // Immediately set active class on click for instant transition
                navItems.forEach(item => item.classList.remove('active'));
                const clickedItem = document.querySelector(`[data-section="${targetId}"]`);
                if (clickedItem) clickedItem.classList.add('active');

                const targetElement = document.getElementById(targetId);
                if (targetElement) {
                    const nav = document.querySelector('.nav-menu');
                    const navHeight = nav ? nav.getBoundingClientRect().height : 54;
                    const offsetTop = targetElement.getBoundingClientRect().top + window.scrollY - navHeight;
                    window.scrollTo({
                        top: offsetTop,
                        behavior: 'smooth'
                    });
                }
            }

            // Update active nav item based on scroll position
            function updateActiveNav() {
                if (isSmoothScrolling) return;
                const scrollPos = window.scrollY + 150; // Offset for better detection

                sections.forEach(section => {
                    const sectionTop = section.offsetTop;
                    const sectionHeight = section.offsetHeight;
                    const sectionId = section.getAttribute('id');

                    if (scrollPos >= sectionTop && scrollPos < sectionTop + sectionHeight) {
                        // Remove active class from all nav items
                        navItems.forEach(item => item.classList.remove('active'));

                        // Add active class to corresponding nav item
                        const activeNavItem = document.querySelector(`[data-section="${sectionId}"]`);
                        if (activeNavItem) {
                            activeNavItem.classList.add('active');
                        }
                    }
                });
            }

            // Add click event listeners to nav items
            navItems.forEach(item => {
                item.addEventListener('click', function (e) {
                    e.preventDefault();
                    const targetSection = this.getAttribute('data-section');
                    smoothScrollTo(targetSection);
                });
            });

            // Add scroll event listener
            window.addEventListener('scroll', () => {
                if (isSmoothScrolling) {
                    clearTimeout(scrollTimeout);
                    scrollTimeout = setTimeout(() => {
                        isSmoothScrolling = false;
                        updateActiveNav();
                    }, 100);
                } else {
                    updateActiveNav();
                }
            });

            // Initial call to set correct active state
            updateActiveNav();
        }

        // Initialize scroll spy when DOM is loaded
        document.addEventListener('DOMContentLoaded', function () {
            initScrollSpy();
        });
    </script>
</body>

</html>
